<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time to Travel - Original</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #0b1116;
            color: #ffffff;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        nav a {
            color: #a0a5ab;
            text-decoration: none;
            margin-left: 20px;
            font-size: 13px;
        }

        .hero {
            padding: 60px 8%;
            background: linear-gradient(rgba(11, 17, 22, 0.5), #0b1116), 
                        url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1920') center/cover;
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero h1 {
            font-size: 45px;
            margin-bottom: 15px;
        }

        .hero p {
            max-width: 500px;
            color: #ccd1d7;
            font-size: 14px;
            line-height: 1.5;
        }

        .tours {
            padding: 60px 8%;
            text-align: center;
        }

        .tours h2 {
            font-size: 24px;
            margin-bottom: 30px;
        }

        .tours-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .tour-card {
            background-color: #141c22;
            border-radius: 8px;
            overflow: hidden;
            height: 300px;
        }

        .tour-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .discover-section {
            padding: 60px 8%;
        }

        .discover-section h2 {
            font-size: 32px;
            margin-bottom: 30px;
        }

        .video-container {
            display: flex;
            gap: 30px;
        }

        .video-left {
            flex: 1.5;
            background-color: #141c22;
            border-radius: 10px;
            overflow: hidden;
            height: 350px;
        }

        .video-left video, .video-left img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-right {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .small-box {
            background-color: #141c22;
            border-radius: 8px;
            overflow: hidden;
            height: 105px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border 0.3s;
        }

        .small-box:hover {
            border-color: #00f2fe;
        }

        .small-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">FLASH.</div>
        <nav>
            <a href="#">MAIN</a>
            <a href="#">ABOUT US</a>
            <a href="#">TOURS</a>
            <a href="#">GALLERY</a>
        </nav>
    </header>

    <section class="hero">
        <h1>TIME TO TRAVEL</h1>
        <p>The best time to visit Rocky Mountain National Park is from June to September when the snow is melted and hiking trails are accessible.</p>
    </section>

    <section class="tours">
        <h2>POPULAR TOURS</h2>
        <div class="tours-grid">
            <div class="tour-card"><img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?q=80&w=400"></div>
            <div class="tour-card"><img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=400"></div>
            <div class="tour-card"><img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?q=80&w=400"></div>
            <div class="tour-card"><img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=400"></div>
        </div>
    </section>

    <section class="discover-section">
        <h2>DISCOVER THE WORLD<br>IN A NEW WAY</h2>
        
        <div class="video-container">
            <div class="video-left">
                <video id="mainVideo" controls src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
            </div>

            <div class="video-right">
                <div class="small-box" onclick="changeVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
                    <img src="https://images.unsplash.com/photo-1500627869374-13cd993b1115?q=80&w=300">
                </div>
                <div class="small-box" onclick="changeVideo('https://www.w3schools.com/html/movie.mp4')">
                    <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=300">
                </div>
                <div class="small-box" onclick="changeVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
                    <img src="https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?q=80&w=300">
                </div>
                <div class="small-box" onclick="changeVideo('https://www.w3schools.com/html/movie.mp4')">
                    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=300">
                </div>
            </div>
        </div>
    </section>

    <script>
        function changeVideo(videoUrl) {
            var bigVideo = document.getElementById('mainVideo');
            bigVideo.src = videoUrl;
            bigVideo.play();
        }
    </script>

</body>
</html>
