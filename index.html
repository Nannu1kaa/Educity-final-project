<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time to Travel - Flash</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #0d131a;
            color: #ffffff;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: rgba(13, 19, 26, 0.95);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a {
            color: #a0a5ab;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active {
            color: #00f2fe; 
        }

        .hero {
            position: relative;
            height: 85vh;
            background: linear-gradient(rgba(13, 19, 26, 0.4), #0d131a), 
                        url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1920') no-repeat center center/cover;
            display: flex;
            align-items: center;
            padding: 0 8%;
        }

        .hero-content {
            max-width: 650px;
        }

        .hero-content h1 {
            font-size: 55px;
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1.1;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .hero-content p {
            font-size: 15px;
            color: #ccd1d7;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .info-cards {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #00f2fe;
            flex: 1;
        }

        .info-card h4 {
            font-size: 14px;
            color: #00f2fe;
            margin-bottom: 5px;
        }

        .info-card p {
            font-size: 12px;
            color: #a0a5ab;
            margin: 0;
        }

        .tours-section {
            padding: 80px 8%;
            text-align: center;
        }

        .section-title {
            font-size: 30px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .section-subtitle {
            font-size: 13px;
            color: #a0a5ab;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tours-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }
